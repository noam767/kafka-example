##############################################################################
# Vault HA Raft — All-in-One ArgoCD Manifests
# Image: hashicorp/vault:1.21.2  |  Chart: hashicorp/vault 0.32.0
# 3 replicas, Raft integrated storage, retry_join auto-peer discovery
#
# USAGE:  kubectl apply -f vault-argocd-all-in-one.yaml
#
# NOTE:   The Application and ApplicationSet both deploy Vault.
#         Use ONE — comment out whichever you don't need.
#         By default the ApplicationSet is commented out.
##############################################################################

---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. Namespace
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: vault

# ---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. ArgoCD Application (DISABLED — using ApplicationSet in section 3)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Uncomment this section if you prefer a plain Application over the
# ApplicationSet below. Do NOT enable both at the same time.

---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. ArgoCD ApplicationSet — Vault HA Raft (multi-env / multi-cluster)
#    Add more elements to the list generator to fan out Vault across clusters.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vault-ha-raft
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: docker-desktop
            url: https://kubernetes.default.svc
            namespace: vault
            environment: local
          # - cluster: staging-eks
          #   url: https://staging.example.com
          #   namespace: vault
          #   environment: staging
  template:
    metadata:
      name: "vault-{{environment}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: vault
        environment: "{{environment}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: "{{url}}"
        namespace: "{{namespace}}"
      source:
        repoURL: https://helm.releases.hashicorp.com
        chart: vault
        targetRevision: "0.32.0"
        helm:
          releaseName: "vault-{{environment}}"
          values: |
            global:
              enabled: true
              tlsDisable: true
            injector:
              enabled: false
            server:
              image:
                repository: hashicorp/vault
                tag: "1.21.2"
                pullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              affinity: ""
              dataStorage:
                enabled: true
                size: 1Gi
                accessMode: ReadWriteOnce
              auditStorage:
                enabled: true
                size: 1Gi
              standalone:
                enabled: false
              ha:
                enabled: true
                replicas: 3
                raft:
                  enabled: true
                  setNodeId: true
                  config: |
                    ui = true
                    disable_mlock = true
                    listener "tcp" {
                      tls_disable     = 1
                      address         = "[::]:8200"
                      cluster_address = "[::]:8201"
                    }
                    storage "raft" {
                      path = "/vault/data"
                      retry_join {
                        leader_api_addr = "http://vault-{{environment}}-0.vault-{{environment}}-internal:8200"
                      }
                      retry_join {
                        leader_api_addr = "http://vault-{{environment}}-1.vault-{{environment}}-internal:8200"
                      }
                      retry_join {
                        leader_api_addr = "http://vault-{{environment}}-2.vault-{{environment}}-internal:8200"
                      }
                    }
                    service_registration "kubernetes" {}
            ui:
              enabled: true
              serviceType: ClusterIP
              externalPort: 8200
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
