##############################################################################
# Strimzi Kafka Operator v0.50.1 — ArgoCD Application (Helm-based)
# Deploys: CRDs + RBAC + Cluster Operator (2 replicas with leader election)
# WatchAnyNamespace: true — manages Kafka in ALL namespaces
# Supported Kafka: 4.0.0, 4.0.1, 4.1.0, 4.1.1
##############################################################################
---
apiVersion: v1
kind: Namespace
metadata:
  name: kafka
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: kafka

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi-operator
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kafka
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  source:
    repoURL: https://strimzi.io/charts/
    chart: strimzi-kafka-operator
    targetRevision: "0.50.1"
    helm:
      releaseName: strimzi-operator
      values: |
        replicas: 2
        watchAnyNamespace: true
        leaderElection:
          enable: true
        logLevel: INFO
        resources:
          requests:
            cpu: 200m
            memory: 384Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        extraEnvs:
          - name: JAVA_OPTS
            value: "-Xms256m -Xmx384m"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
