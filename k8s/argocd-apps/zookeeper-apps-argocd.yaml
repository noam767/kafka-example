##############################################################################
# ZooKeeper Apps — ArgoCD Application
# Config Watcher + Snapshot Backup CronJob
# Points to k8s/zookeeper/ directory in this repo
##############################################################################
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zookeeper-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  source:
    repoURL: https://github.com/noam767/kafka-example.git
    targetRevision: HEAD
    path: k8s/zookeeper
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
