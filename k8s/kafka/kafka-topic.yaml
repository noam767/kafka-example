##############################################################################
# KafkaTopic — demo-topic
# 5 partitions, replication factor 3 (matches 3 brokers)
##############################################################################
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: demo-topic
  namespace: kafka
  labels:
    strimzi.io/cluster: demo-kafka
spec:
  partitions: 5
  replicas: 3
  config:
    retention.ms: "604800000"
    segment.bytes: "1073741824"
    min.insync.replicas: "2"
