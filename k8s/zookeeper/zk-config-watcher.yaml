##############################################################################
# ZooKeeper Config Watcher — Watches producer/consumer config znodes
# Uses ZooKeeper watch (Observer) mechanism to detect config changes
# Initializes znodes with current producer/consumer config, then watches
##############################################################################
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-config-watcher-script
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
data:
  init-znodes.txt: |
    create /kafka-platform init
    create /kafka-platform/config init
    create /kafka-platform/config/producer bootstrap=demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092,topic=demo-topic,interval_ms=2000
    create /kafka-platform/config/consumer bootstrap=demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092,topic=demo-topic,group_id=demo-consumer-group
    create /kafka-platform/config/connect bootstrap=demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092,database=kafka_sink,collection=demo_topic_data
    quit
  watcher.py: |
    #!/usr/bin/env python3
    """ZooKeeper Config Watcher — uses kazoo to set persistent watches on config znodes."""
    import os, sys, time, json, signal
    from kazoo.client import KazooClient
    from kazoo.recipe.watchers import ChildrenWatch, DataWatch

    ZK_HOSTS = os.environ.get("ZK_CONNECT", "zookeeper.kafka.svc.cluster.local:2181")
    CONFIG_ROOT = "/kafka-platform/config"
    POLL_INTERVAL = 15

    def main():
        print(f"[watcher] Connecting to ZooKeeper: {ZK_HOSTS}", flush=True)
        zk = KazooClient(hosts=ZK_HOSTS)
        zk.start(timeout=30)
        print("[watcher] Connected.", flush=True)

        # Track previous values for change detection
        prev = {}

        def make_data_watch(path):
            """Create a DataWatch callback for a given znode path."""
            def watch_func(data, stat, event):
                name = path.split("/")[-1]
                value = data.decode("utf-8") if data else ""
                ts = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
                if name in prev and prev[name] != value:
                    print(f"[watcher] [{ts}] >>> CHANGE DETECTED: {name} <<<", flush=True)
                    print(f"[watcher]   OLD: {prev[name]}", flush=True)
                    print(f"[watcher]   NEW: {value}", flush=True)
                else:
                    print(f"[watcher] [{ts}] {name} => {value}", flush=True)
                prev[name] = value
            return watch_func

        def children_watch(children):
            """Watch for new config znodes under /kafka-platform/config."""
            ts = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
            print(f"[watcher] [{ts}] Config znodes: {children}", flush=True)
            for child in children:
                path = f"{CONFIG_ROOT}/{child}"
                DataWatch(zk, path, func=make_data_watch(path))

        # Set up children watch (auto-registers data watches for each child)
        print(f"[watcher] Setting watches on {CONFIG_ROOT}...", flush=True)
        ChildrenWatch(zk, CONFIG_ROOT, func=children_watch)

        # Keep alive
        print("[watcher] Watching for config changes... (Ctrl+C to stop)", flush=True)
        signal.signal(signal.SIGTERM, lambda *_: (zk.stop(), sys.exit(0)))
        while True:
            time.sleep(POLL_INTERVAL)

    if __name__ == "__main__":
        main()
  update-config.sh: |
    #!/bin/bash
    # Utility: update a config znode to trigger watcher
    # Usage: kubectl exec <watcher-pod> -- /scripts/update-config.sh producer 'new-value'
    ZK_HOST="${ZK_CONNECT:-zookeeper.kafka.svc.cluster.local:2181}"
    python3 -c "
    from kazoo.client import KazooClient
    zk = KazooClient(hosts='${ZK_HOST}')
    zk.start()
    zk.set('/kafka-platform/config/$1', b'$2')
    zk.stop()
    print('[update] Set /kafka-platform/config/$1 = $2')
    "
---
apiVersion: v1
kind: Secret
metadata:
  name: zk-config-watcher-secret
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
  annotations:
    vault-path: secret/kafka/zookeeper
stringData:
  ZK_CLIENT_USER: "zkuser"
  ZK_CLIENT_PASSWORD: "zkpass123"
  ZK_CONNECT: "zookeeper-0.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-1.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-2.zookeeper-headless.kafka.svc.cluster.local:2181"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-config-watcher
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zk-config-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zk-config-watcher
        app.kubernetes.io/part-of: kafka
        app.kubernetes.io/component: zookeeper
    spec:
      initContainers:
        - name: init-znodes
          image: docker.io/bitnamilegacy/zookeeper:3.9.3
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              ZK_HOST="$ZK_CONNECT"
              ZK_CLI="/opt/bitnami/zookeeper/bin/zkCli.sh"
              echo "[init] Waiting for ZooKeeper..."
              until $ZK_CLI -server "$ZK_HOST" ls / 2>/dev/null | grep -q "\["; do
                sleep 3
              done
              echo "[init] Creating config znodes..."
              # Create znodes one at a time, ignore errors if they exist
              $ZK_CLI -server "$ZK_HOST" create /kafka-platform init 2>/dev/null || true
              $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config init 2>/dev/null || true
              $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config/producer "bootstrap=demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092,topic=demo-topic,interval_ms=2000" 2>/dev/null || true
              $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config/consumer "bootstrap=demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092,topic=demo-topic,group_id=demo-consumer-group" 2>/dev/null || true
              $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config/connect "bootstrap=demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092,database=kafka_sink,collection=demo_topic_data" 2>/dev/null || true
              echo "[init] Znodes ready."
          envFrom:
            - secretRef:
                name: zk-config-watcher-secret
      containers:
        - name: watcher
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              pip install --quiet kazoo && python3 /scripts/watcher.py
          envFrom:
            - secretRef:
                name: zk-config-watcher-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: zk-config-watcher-script
            defaultMode: 0755
