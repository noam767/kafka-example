##############################################################################
# ZooKeeper Config Watcher — Watches producer/consumer config znodes
# Uses ZooKeeper watch (Observer) mechanism to detect config changes
# Initializes znodes with current producer/consumer config, then watches
##############################################################################
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-config-watcher-script
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
data:
  watcher.sh: |
    #!/bin/bash
    set -e

    ZK_HOST="${ZK_CONNECT:-zookeeper.kafka.svc.cluster.local:2181}"
    ZK_CLI="/opt/bitnami/zookeeper/bin/zkCli.sh"

    echo "[watcher] Connecting to ZooKeeper: ${ZK_HOST}"
    echo "[watcher] Waiting for ZooKeeper to be ready..."
    until $ZK_CLI -server "$ZK_HOST" ls / 2>/dev/null | grep -q "\["; do
      echo "[watcher] ZooKeeper not ready, retrying in 5s..."
      sleep 5
    done
    echo "[watcher] ZooKeeper is ready."

    # Build producer config JSON (no special chars that confuse zkCli)
    PRODUCER_DATA="bootstrap=${KAFKA_BOOTSTRAP_SERVERS},topic=${KAFKA_TOPIC},interval_ms=${PRODUCE_INTERVAL_MS}"
    CONSUMER_DATA="bootstrap=${KAFKA_BOOTSTRAP_SERVERS},topic=${KAFKA_TOPIC},group_id=${KAFKA_GROUP_ID}"
    CONNECT_DATA="bootstrap=${KAFKA_BOOTSTRAP_SERVERS},database=kafka_sink,collection=demo_topic_data"

    # Initialize config znodes — create hierarchy then set data
    echo "[watcher] Initializing config znodes..."
    $ZK_CLI -server "$ZK_HOST" create /kafka-platform "" 2>/dev/null || true
    $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config "" 2>/dev/null || true
    $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config/producer "$PRODUCER_DATA" 2>/dev/null || true
    $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config/consumer "$CONSUMER_DATA" 2>/dev/null || true
    $ZK_CLI -server "$ZK_HOST" create /kafka-platform/config/connect "$CONNECT_DATA" 2>/dev/null || true
    echo "[watcher] Znodes initialized (or already exist)."

    # Continuous watch loop — polls znodes and detects changes
    echo "[watcher] Starting config watch loop on /kafka-platform/config..."

    PREV_PRODUCER=""
    PREV_CONSUMER=""
    PREV_CONNECT=""

    while true; do
      echo "============================================="
      echo "[watcher] $(date -u '+%Y-%m-%dT%H:%M:%SZ') Polling config znodes..."

      # Read current values
      CUR_PRODUCER=$($ZK_CLI -server "$ZK_HOST" get /kafka-platform/config/producer 2>/dev/null | grep -v "^$\|^WATCHER\|^WatchedEvent\|^cZxid\|^ctime\|^mZxid\|^mtime\|^pZxid\|^cversion\|^dataVersion\|^aclVersion\|^ephemeralOwner\|^dataLength\|^numChildren\|^Connecting\|^Welcome" | head -1) || true
      CUR_CONSUMER=$($ZK_CLI -server "$ZK_HOST" get /kafka-platform/config/consumer 2>/dev/null | grep -v "^$\|^WATCHER\|^WatchedEvent\|^cZxid\|^ctime\|^mZxid\|^mtime\|^pZxid\|^cversion\|^dataVersion\|^aclVersion\|^ephemeralOwner\|^dataLength\|^numChildren\|^Connecting\|^Welcome" | head -1) || true
      CUR_CONNECT=$($ZK_CLI -server "$ZK_HOST" get /kafka-platform/config/connect 2>/dev/null | grep -v "^$\|^WATCHER\|^WatchedEvent\|^cZxid\|^ctime\|^mZxid\|^mtime\|^pZxid\|^cversion\|^dataVersion\|^aclVersion\|^ephemeralOwner\|^dataLength\|^numChildren\|^Connecting\|^Welcome" | head -1) || true

      echo "[watcher] producer => $CUR_PRODUCER"
      echo "[watcher] consumer => $CUR_CONSUMER"
      echo "[watcher] connect  => $CUR_CONNECT"

      # Detect changes
      if [ -n "$PREV_PRODUCER" ] && [ "$CUR_PRODUCER" != "$PREV_PRODUCER" ]; then
        echo "[watcher] >>> CHANGE DETECTED: producer config updated <<<"
        echo "[watcher]   OLD: $PREV_PRODUCER"
        echo "[watcher]   NEW: $CUR_PRODUCER"
      fi
      if [ -n "$PREV_CONSUMER" ] && [ "$CUR_CONSUMER" != "$PREV_CONSUMER" ]; then
        echo "[watcher] >>> CHANGE DETECTED: consumer config updated <<<"
        echo "[watcher]   OLD: $PREV_CONSUMER"
        echo "[watcher]   NEW: $CUR_CONSUMER"
      fi
      if [ -n "$PREV_CONNECT" ] && [ "$CUR_CONNECT" != "$PREV_CONNECT" ]; then
        echo "[watcher] >>> CHANGE DETECTED: connect config updated <<<"
        echo "[watcher]   OLD: $PREV_CONNECT"
        echo "[watcher]   NEW: $CUR_CONNECT"
      fi

      PREV_PRODUCER="$CUR_PRODUCER"
      PREV_CONSUMER="$CUR_CONSUMER"
      PREV_CONNECT="$CUR_CONNECT"

      echo "[watcher] Sleeping 15s before next poll..."
      sleep 15
    done
  update-config.sh: |
    #!/bin/bash
    # Utility script: update a config znode to trigger watcher detection
    # Usage: update-config.sh <producer|consumer|connect> '<value>'
    ZK_HOST="${ZK_CONNECT:-zookeeper.kafka.svc.cluster.local:2181}"
    ZK_CLI="/opt/bitnami/zookeeper/bin/zkCli.sh"
    ZNODE="/kafka-platform/config/$1"
    VALUE="$2"
    echo "[update] Setting ${ZNODE} = ${VALUE}"
    $ZK_CLI -server "$ZK_HOST" set "$ZNODE" "$VALUE"
    echo "[update] Done. Watcher will detect change on next poll."
---
apiVersion: v1
kind: Secret
metadata:
  name: zk-config-watcher-secret
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
  annotations:
    vault-path: secret/kafka/zookeeper
stringData:
  ZK_CLIENT_USER: "zkuser"
  ZK_CLIENT_PASSWORD: "zkpass123"
  ZK_CONNECT: "zookeeper-0.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-1.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-2.zookeeper-headless.kafka.svc.cluster.local:2181"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-config-watcher
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zk-config-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zk-config-watcher
        app.kubernetes.io/part-of: kafka
        app.kubernetes.io/component: zookeeper
    spec:
      containers:
        - name: watcher
          image: docker.io/bitnamilegacy/zookeeper:3.9.3
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/scripts/watcher.sh"]
          envFrom:
            - secretRef:
                name: zk-config-watcher-secret
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "demo-topic"
            - name: PRODUCE_INTERVAL_MS
              value: "2000"
            - name: KAFKA_GROUP_ID
              value: "demo-consumer-group"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: zk-config-watcher-script
            defaultMode: 0755
