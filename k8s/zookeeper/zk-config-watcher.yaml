##############################################################################
# ZooKeeper Config Watcher — Watches producer/consumer config znodes
# Uses ZooKeeper watch (Observer) mechanism to detect config changes
# Initializes znodes with current producer/consumer config, then watches
##############################################################################
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-config-watcher-script
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
data:
  init-znodes.py: |
    #!/usr/bin/env python3
    """Initialize ZooKeeper znodes with Kafka producer/consumer/connect configs."""
    import os, json, time
    from kazoo.client import KazooClient
    from kazoo.exceptions import NodeExistsError

    ZK_HOSTS = os.environ.get("ZK_CONNECT", "zookeeper.kafka.svc.cluster.local:2181")

    # --- Producer config (matches ProducerApp.java) ---
    PRODUCER_CONFIG = {
        "bootstrap.servers": "demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092",
        "topic": "demo-topic",
        "acks": "all",
        "retries": 3,
        "linger.ms": 10,
        "batch.size": 16384,
        "buffer.memory": 33554432,
        "max.block.ms": 60000,
        "delivery.timeout.ms": 120000,
        "request.timeout.ms": 30000,
        "produce.interval.ms": 2000,
    }

    # --- Consumer config (matches ConsumerApp.java) ---
    CONSUMER_CONFIG = {
        "bootstrap.servers": "demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092",
        "topic": "demo-topic",
        "group.id": "demo-consumer-group",
        "auto.offset.reset": "earliest",
        "enable.auto.commit": True,
        "auto.commit.interval.ms": 5000,
        "poll.timeout.ms": 1000,
        "max.poll.records": 500,
        "max.poll.interval.ms": 300000,
        "session.timeout.ms": 45000,
        "heartbeat.interval.ms": 3000,
        "fetch.min.bytes": 1,
        "fetch.max.wait.ms": 500,
    }

    # --- Connect config (matches KafkaConnect CR) ---
    CONNECT_CONFIG = {
        "bootstrap.servers": "demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092",
        "connector.class": "com.mongodb.kafka.connect.MongoSinkConnector",
        "topics": "demo-topic",
        "tasks.max": 1,
        "connection.uri": "mongodb://root:mongopass@mongodb.kafka.svc.cluster.local:27017",
        "database": "kafka_sink",
        "collection": "demo_topic_data",
        "key.converter": "org.apache.kafka.connect.storage.StringConverter",
        "value.converter": "org.apache.kafka.connect.storage.StringConverter",
    }

    def ensure_path(zk, path, data=b""):
        """Create znode if it doesn't exist, or update if it does."""
        try:
            zk.create(path, data, makepath=True)
            print(f"[init] Created {path}", flush=True)
        except NodeExistsError:
            zk.set(path, data)
            print(f"[init] Updated {path}", flush=True)

    def main():
        print(f"[init] Connecting to ZooKeeper: {ZK_HOSTS}", flush=True)
        zk = KazooClient(hosts=ZK_HOSTS)
        zk.start(timeout=30)
        print("[init] Connected.", flush=True)

        # Create hierarchy
        ensure_path(zk, "/kafka-platform", b"kafka-platform-root")
        ensure_path(zk, "/kafka-platform/config", b"config-root")

        # Store full configs as JSON
        ensure_path(zk, "/kafka-platform/config/producer",
                    json.dumps(PRODUCER_CONFIG, indent=2).encode())
        ensure_path(zk, "/kafka-platform/config/consumer",
                    json.dumps(CONSUMER_CONFIG, indent=2).encode())
        ensure_path(zk, "/kafka-platform/config/connect",
                    json.dumps(CONNECT_CONFIG, indent=2).encode())

        # Also store individual tuning params as sub-znodes for granular watching
        print("[init] Creating producer tuning znodes...", flush=True)
        for key, val in PRODUCER_CONFIG.items():
            ensure_path(zk, f"/kafka-platform/config/producer/{key}",
                        str(val).encode())

        print("[init] Creating consumer tuning znodes...", flush=True)
        for key, val in CONSUMER_CONFIG.items():
            ensure_path(zk, f"/kafka-platform/config/consumer/{key}",
                        str(val).encode())

        print("[init] Creating connect config znodes...", flush=True)
        for key, val in CONNECT_CONFIG.items():
            ensure_path(zk, f"/kafka-platform/config/connect/{key}",
                        str(val).encode())

        zk.stop()
        print("[init] All config znodes initialized.", flush=True)

    if __name__ == "__main__":
        main()
  watcher.py: |
    #!/usr/bin/env python3
    """ZooKeeper Config Watcher — uses kazoo to set persistent watches on config znodes."""
    import os, sys, time, json, signal
    from kazoo.client import KazooClient
    from kazoo.recipe.watchers import ChildrenWatch, DataWatch

    ZK_HOSTS = os.environ.get("ZK_CONNECT", "zookeeper.kafka.svc.cluster.local:2181")
    CONFIG_ROOT = "/kafka-platform/config"
    POLL_INTERVAL = 15

    def main():
        print(f"[watcher] Connecting to ZooKeeper: {ZK_HOSTS}", flush=True)
        zk = KazooClient(hosts=ZK_HOSTS)
        zk.start(timeout=30)
        print("[watcher] Connected.", flush=True)

        # Track previous values for change detection
        prev = {}

        def make_data_watch(path):
            """Create a DataWatch callback for a given znode path."""
            def watch_func(data, stat, event):
                name = path.split("/")[-1]
                value = data.decode("utf-8") if data else ""
                ts = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
                if name in prev and prev[name] != value:
                    print(f"[watcher] [{ts}] >>> CHANGE DETECTED: {name} <<<", flush=True)
                    print(f"[watcher]   OLD: {prev[name]}", flush=True)
                    print(f"[watcher]   NEW: {value}", flush=True)
                else:
                    print(f"[watcher] [{ts}] {name} => {value}", flush=True)
                prev[name] = value
            return watch_func

        def children_watch(children):
            """Watch for new config znodes under /kafka-platform/config."""
            ts = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
            print(f"[watcher] [{ts}] Config znodes: {children}", flush=True)
            for child in children:
                path = f"{CONFIG_ROOT}/{child}"
                DataWatch(zk, path, func=make_data_watch(path))

        # Set up children watch (auto-registers data watches for each child)
        print(f"[watcher] Setting watches on {CONFIG_ROOT}...", flush=True)
        ChildrenWatch(zk, CONFIG_ROOT, func=children_watch)

        # Keep alive
        print("[watcher] Watching for config changes... (Ctrl+C to stop)", flush=True)
        signal.signal(signal.SIGTERM, lambda *_: (zk.stop(), sys.exit(0)))
        while True:
            time.sleep(POLL_INTERVAL)

    if __name__ == "__main__":
        main()
  update-config.sh: |
    #!/bin/bash
    # Utility: update a config znode to trigger watcher
    # Usage: kubectl exec <watcher-pod> -- /scripts/update-config.sh producer 'new-value'
    ZK_HOST="${ZK_CONNECT:-zookeeper.kafka.svc.cluster.local:2181}"
    python3 -c "
    from kazoo.client import KazooClient
    zk = KazooClient(hosts='${ZK_HOST}')
    zk.start()
    zk.set('/kafka-platform/config/$1', b'$2')
    zk.stop()
    print('[update] Set /kafka-platform/config/$1 = $2')
    "
---
apiVersion: v1
kind: Secret
metadata:
  name: zk-config-watcher-secret
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
  annotations:
    vault-path: secret/kafka/zookeeper
stringData:
  ZK_CLIENT_USER: "zkuser"
  ZK_CLIENT_PASSWORD: "zkpass123"
  ZK_CONNECT: "zookeeper-0.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-1.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-2.zookeeper-headless.kafka.svc.cluster.local:2181"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zk-config-watcher
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-config-watcher
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zk-config-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zk-config-watcher
        app.kubernetes.io/part-of: kafka
        app.kubernetes.io/component: zookeeper
    spec:
      initContainers:
        - name: init-znodes
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              pip install --quiet kazoo && python3 /scripts/init-znodes.py
          envFrom:
            - secretRef:
                name: zk-config-watcher-secret
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      containers:
        - name: watcher
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              pip install --quiet kazoo && python3 /scripts/watcher.py
          envFrom:
            - secretRef:
                name: zk-config-watcher-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: zk-config-watcher-script
            defaultMode: 0755
