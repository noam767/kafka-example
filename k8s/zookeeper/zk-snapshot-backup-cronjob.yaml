##############################################################################
# ZooKeeper Snapshot Backup CronJob
# Runs every 6 hours — exports ZK znode tree and stores it in MongoDB
# Target: mongodb.kafka.svc.cluster.local / kafka_sink.zk_snapshots
##############################################################################
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zk-backup-script
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-snapshot-backup
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
data:
  backup.py: |
    #!/usr/bin/env python3
    """ZooKeeper Snapshot Backup — dumps all znodes to MongoDB."""
    import os, sys, time, datetime
    from kazoo.client import KazooClient
    from pymongo import MongoClient

    ZK_HOSTS = os.environ.get("ZK_CONNECT", "zookeeper.kafka.svc.cluster.local:2181")
    MONGO_URI = os.environ.get("MONGO_CONNECTION_URI", "mongodb://root:mongopass@mongodb.kafka.svc.cluster.local:27017")
    MONGO_DB = "kafka_sink"
    MONGO_COLLECTION = "zk_snapshots"
    MAX_BACKUPS = 20

    def get_all_znodes(zk, path="/"):
        """Recursively get all znodes and their data."""
        znodes = []
        try:
            data, stat = zk.get(path)
            znodes.append({
                "path": path,
                "data": data.decode("utf-8", errors="replace") if data else "",
                "version": stat.version,
                "created": stat.created,
                "modified": stat.last_modified,
                "children_count": stat.numChildren,
                "data_length": stat.dataLength,
            })
            children = zk.get_children(path)
            for child in children:
                child_path = f"{path}/{child}" if path != "/" else f"/{child}"
                # Skip ZK internal nodes
                if child_path.startswith("/zookeeper"):
                    continue
                znodes.extend(get_all_znodes(zk, child_path))
        except Exception as e:
            print(f"[backup] Warning: failed to read {path}: {e}", flush=True)
        return znodes

    def main():
        backup_id = f"zk-backup-{datetime.datetime.utcnow().strftime('%Y%m%d-%H%M%S')}"
        timestamp = datetime.datetime.utcnow()
        print(f"[backup] Starting ZooKeeper snapshot backup: {backup_id}", flush=True)

        # Connect to ZooKeeper
        print(f"[backup] Connecting to ZooKeeper: {ZK_HOSTS}", flush=True)
        zk = KazooClient(hosts=ZK_HOSTS)
        zk.start(timeout=30)
        print("[backup] Connected to ZooKeeper.", flush=True)

        # Dump all znodes
        print("[backup] Dumping znode tree...", flush=True)
        znodes = get_all_znodes(zk)
        zk.stop()
        print(f"[backup] Collected {len(znodes)} znodes.", flush=True)

        # Connect to MongoDB
        print(f"[backup] Connecting to MongoDB...", flush=True)
        mongo = MongoClient(MONGO_URI)
        db = mongo[MONGO_DB]
        collection = db[MONGO_COLLECTION]

        # Insert snapshot
        doc = {
            "backup_id": backup_id,
            "timestamp": timestamp,
            "znode_count": len(znodes),
            "snapshot_data": znodes,
            "metadata": {
                "zk_host": ZK_HOSTS,
                "created_by": "zk-snapshot-backup-cronjob",
                "version": "2.0",
            }
        }
        collection.insert_one(doc)
        print(f"[backup] Snapshot stored in MongoDB: {MONGO_DB}.{MONGO_COLLECTION}", flush=True)

        # Retention: keep only last N backups
        total = collection.count_documents({})
        if total > MAX_BACKUPS:
            oldest = list(collection.find().sort("timestamp", 1).limit(total - MAX_BACKUPS))
            ids = [d["_id"] for d in oldest]
            collection.delete_many({"_id": {"$in": ids}})
            print(f"[backup] Pruned {len(ids)} old backups. Remaining: {MAX_BACKUPS}", flush=True)
        else:
            print(f"[backup] Total backups: {total}", flush=True)

        mongo.close()
        print(f"[backup] Backup complete: {backup_id}", flush=True)

    if __name__ == "__main__":
        main()
---
apiVersion: v1
kind: Secret
metadata:
  name: zk-backup-secret
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-snapshot-backup
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
  annotations:
    vault-path: secret/kafka/zookeeper
    vault-path-mongo: secret/kafka/mongodb
stringData:
  ZK_CLIENT_USER: "zkuser"
  ZK_CLIENT_PASSWORD: "zkpass123"
  ZK_CONNECT: "zookeeper-0.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-1.zookeeper-headless.kafka.svc.cluster.local:2181,zookeeper-2.zookeeper-headless.kafka.svc.cluster.local:2181"
  MONGO_CONNECTION_URI: "mongodb://root:mongopass@mongodb.kafka.svc.cluster.local:27017"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zk-snapshot-backup
  namespace: kafka
  labels:
    app.kubernetes.io/name: zk-snapshot-backup
    app.kubernetes.io/part-of: kafka
    app.kubernetes.io/component: zookeeper
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: zk-snapshot-backup
            app.kubernetes.io/part-of: kafka
            app.kubernetes.io/component: zookeeper
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: python:3.12-slim
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  pip install --quiet kazoo pymongo && python3 /scripts/backup.py
              envFrom:
                - secretRef:
                    name: zk-backup-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: zk-backup-script
                defaultMode: 0755
