##############################################################################
# Kafka Client Config — K8s Secrets (sourced from Vault)
# Vault paths: secret/kafka/producer, secret/kafka/consumer
# In production, use Vault Agent Injector or External Secrets Operator
##############################################################################
---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-producer-config
  namespace: kafka
  labels:
    app: kafka-producer
    app.kubernetes.io/part-of: kafka
  annotations:
    vault-path: secret/kafka/producer
type: Opaque
stringData:
  KAFKA_BOOTSTRAP_SERVERS: "demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC: "demo-topic"
  PRODUCE_INTERVAL_MS: "2000"

---
apiVersion: v1
kind: Secret
metadata:
  name: kafka-consumer-config
  namespace: kafka
  labels:
    app: kafka-consumer
    app.kubernetes.io/part-of: kafka
  annotations:
    vault-path: secret/kafka/consumer
type: Opaque
stringData:
  KAFKA_BOOTSTRAP_SERVERS: "demo-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC: "demo-topic"
  KAFKA_GROUP_ID: "demo-consumer-group"
